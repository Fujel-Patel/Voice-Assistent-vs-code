# .pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6.0
          - fastapi
          - pytest
          - pytest-asyncio
          - loguru
          - httpx
          - anthropic
          - google-genai
          - types-PyYAML
          - types-requests
          - types-setuptools
          - types-Pillow
          - types-psutil
          - numpy
          - pydantic-settings